name: Repository CI/CD

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    uses: ./.github/workflows/reusable-pipeline.yml
    with:
      generate-coverage: true
      upload-codecov: true
      publish-github-packages: true
    secrets: inherit

  clean:
    name: "Clean Old Packages"
    needs: pipeline
    uses: ./.github/workflows/clean-packages.yml